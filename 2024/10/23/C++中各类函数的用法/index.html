        <h1 id="C-中各类函数的用法"><a href="#C-中各类函数的用法" class="headerlink" title="C++中各类函数的用法"></a>C++中各类函数的用法</h1><h3 id="1-bitset"><a href="#1-bitset" class="headerlink" title="1.bitset"></a>1.bitset</h3><figure class="highlight c++"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">bitset</span>&lt;n&gt;(x) <span class="comment">//将x转换为n进制数</span></span><br></pre></td></tr></table></figure>



<h3 id="2-vector"><a href="#2-vector" class="headerlink" title="2.vector"></a>2.vector</h3><figure class="highlight c++"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">vector&lt;<span class="type">int</span>&gt; a;             <span class="comment">//可以自动维护数组长度，适合用在增删查改数组上</span></span><br><span class="line"></span><br><span class="line">vector中的方法：</span><br><span class="line">    a.<span class="built_in">push_back</span>(n)         <span class="comment">//将放入a的最后一位</span></span><br><span class="line">    a.<span class="built_in">begin</span>()			   <span class="comment">//代指a的第一个数据的位置</span></span><br><span class="line">    a.<span class="built_in">end</span>()				   <span class="comment">//代指a的最后一个数据的位置</span></span><br><span class="line">    a.<span class="built_in">erase</span>(x,y)		   <span class="comment">//将a中的x——y范围的数据全部删除，此时vector会自动维护长度</span></span><br></pre></td></tr></table></figure>



<h3 id="3-reverse"><a href="#3-reverse" class="headerlink" title="3.reverse"></a>3.reverse</h3><figure class="highlight c++"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">reverse</span>(x,y); 					<span class="comment">//翻转数组中范围为x——y的元素</span></span><br></pre></td></tr></table></figure>



<h3 id="4-memset"><a href="#4-memset" class="headerlink" title="4.memset"></a>4.memset</h3><figure class="highlight c++"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">memset</span>(c, <span class="number">0</span> ,<span class="built_in">sizeof</span>(<span class="type">int</span>) * (n + <span class="number">1</span>) ); <span class="comment">//将c中在n+1之前的所有元素更改为0</span></span><br></pre></td></tr></table></figure>
